<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Absensi Wajah Otomatis</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; }
        #video-container { position: relative; margin-top: 20px; }
        video { border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { position: absolute; top: 0; left: 0; }
        #status { font-size: 24px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>KIOSK ABSENSI WAJAH</h1>
    <div id="video-container">
        <video id="video" width="720" height="560" autoplay muted></video>
    </div>
    <div id="status">Menginisialisasi Kamera...</div>
</body>
</html>
